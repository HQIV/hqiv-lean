name = "hqiv-lean"
version = "0.1.0"

# Default: lepton resonance + global-detuning obstruction only (no SO(8) / GeneratorsLieClosure).
# Witness subset: lake build HQIVWitnesses
# Full physics (includes SM_GR → ChargedLeptonResonance / Triality → SO8 abstract): lake build HQIVPhysics
# Full repo (no matrix Lie-closure): lake build HQIVLEAN ; SO(8) matrix + abstract closure pack: lake build HQIVSO8Closure
# Optional SU(3) chart Lie certificate (heavy): lake build HQIVStrongColorSu3Certificate
# Brane–bulk strong-sector cone (Fano-truss + YM package + holonomy glue): lake build HQIVBraneBulkStrongSector
# Optional spinor monomial det mod 101 (very heavy `native_decide`; not in HQIVLEAN): lake build HQIVSpinorMonomialCert
# Curated physics surface (CI): lake build HQIVMeaningfulPhysics ; narrative spine: lake build HQIVStory
# Quantum chemistry (LiH ξ bridge): lake build Hqiv.QuantumChemistry.LiH
defaultTargets = ["HQIVLeptonResonance"]

[[lean_lib]]
name = "HQIVLeptonResonance"
# FanoResonance import chain only (OctonionicLightCone → … → LeptonResonanceGlobalDetuning). No Triality / SO8ClosureAbstract.
