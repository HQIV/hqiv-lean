[[lean_lib]]
name = "HQIVParallelPoincare"
# Discrete parallel Poincaré scaffold (null-lattice 3-complex + curvature channel + tiered targets).
globs = [
  "HQIVParallelPoincare",
  "Hqiv.Topology.DiscreteNullLatticeComplex",
  "Hqiv.Topology.DiscreteCurvatureChannel",
  "Hqiv.Topology.DiscretePhaseEvolution",
  "Hqiv.Topology.ParallelPoincareScaffold",
  "Hqiv.Topology.ParallelPoincareReferenceModel",
  "RhFourierLift.Setup",
  "Hqiv.Geometry.OctonionicLightCone",
  "Hqiv.Geometry.LatticePointMaxAbsShells",
  "Hqiv.Physics.BraneBulkFanoTruss",
  "Hqiv.Physics.FanoLine",
  "Hqiv.Algebra.PhaseLiftDelta",
  "Hqiv.Algebra.G2Embedding",
  "Hqiv.Algebra.Triality",
  "Hqiv.OctonionLeftMultiplication",
  "Hqiv.SO8ClosureSymbolic",
  "Hqiv.Generators",
  "Hqiv.GeneratorsFromAxioms",
  "Hqiv.MatrixLieBracket",
  "Hqiv.Geometry.AuxiliaryField",
]

[[lean_lib]]
name = "HQIVPaperClaims"
# Minimal proof cone for `papers/hqiv_rapidity_manifold_so8_closure` Appendix A only.
globs = ["HQIVPaperClaims"]

[[lean_lib]]
name = "HQIVStrongColorSu3Certificate"
# Auto-generated `@[simp]` table for nonzero `f^{abc}` + certificate entrypoint (not part of default HQIVLEAN).
# Full chart Lie law `[T^a,T^b] = I • ∑ f^{abc} T^c` for all `(a,b)` is still a target layered on this table.
globs = [
  "HQIVStrongColorSu3Certificate",
  "Hqiv.Physics.StrongColorSu3LieCertificate",
  "Hqiv.Physics.StrongColorSu3fStructureSimp",
  "Hqiv.Physics.StrongColorSu3LieChartLaw",
]

[[lean_lib]]
name = "HQIVColorEWMirrorBridge"
# Thin Furey-gap bookkeeping bridge: color chart mirrors the EW gauge-on-carrier pattern; no G2 span claim.
globs = ["Hqiv.Physics.ColorEWMirrorBridge", "Hqiv.Physics.ColorG2AlignedTripletScaffold"]

[[lean_lib]]
name = "HQIVBraneBulkStrongSector"
# Fano-truss / null-lattice bridge + canonical YM package + abelian holonomy glue.
# Pulls `SO8ClosureAbstract` via `HQIVYangMillsPackage` (heavy; do not run two SO(8) builds in parallel).
# For `Hqiv.Algebra.G2DeltaGeneratedLie` explicitly: `lake build Hqiv.Algebra.G2DeltaGeneratedLie` or `HQIVSO8Closure`.
globs = [
  "HQIVBraneBulkStrongSector",
  "Hqiv.Physics.BraneBulkFanoTruss",
  "Hqiv.Physics.G2AutomorphismEnergyCost",
  "Hqiv.Physics.DiscreteYMConfinement",
  "Hqiv.Physics.HQIVYangMillsPackage",
  "Hqiv.Physics.ActionHolonomyGlue",
]

[[lean_lib]]
name = "HQIVSpinorMonomialCert"
# `CliffordCl06SixSpinorMonomialMatrixCert` only: 64×64 `ZMod 101` determinant via `native_decide` (high RAM / long kernel).
globs = ["Hqiv.Algebra.CliffordCl06SixSpinorMonomialMatrixCert"]

